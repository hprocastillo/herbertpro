<div id="resume-mobile" class="custom-border bg-white p-4 mb-4">
  <h3>Resum<span class="prompt">e</span></h3>
  <h5 class="fw-bold">Experience</h5>

  <div *ngFor="let exp of listExperiences" class="card mt-4 mb-4">
    <div class="card-body p-3">

      <div class="row">
        <div class="col-3">
          <img [src]="[exp.logoCompany]" alt="" class="img-fluid">
        </div>
        <div class="col-9 p-0">
          <p class="fw-bold p-0 m-0">{{exp.nameCompany}}</p>
          <p class="text-muted p-0 m-0">{{exp.charge}}</p>
          <p class="small p-0 m-0">{{exp.location}} &bull; {{exp.duration}}</p>
        </div>
      </div>

      <div class="row mt-3">
        <div class="col-12">
          <p>{{exp.description}}</p>
        </div>
      </div>

    </div>
  </div>
</div>
