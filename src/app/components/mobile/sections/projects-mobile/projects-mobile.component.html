<div id="projects-mobile" class="rounded-corner bg-white p-4 mb-4">
  <h3>Project<span class="prompt">s</span></h3>

  <div class="card card-rounded mt-4 mb-4" *ngFor="let pj of listProjects">
    <div class="card-body p-3">

      <!-- BRAND LOGO, TITLE -->
      <div class="row">
        <div class="col-3">
          <img [src]="[pj.logo || './assets/images/icons/app.png']" alt="" class="img-fluid">
        </div>
        <div class="col-9 p-0">
          <p class="fw-bold m-0 p-0">{{pj.name}}</p>
          <p class="fw-bold m-0 p-0 small">{{pj.typeApp}}</p>
          <p class="text-muted small m-0 p-0">{{pj.stackTech}}</p>
        </div>
      </div>

      <!-- DESCRIPTION CONTENT -->
      <div class="row mt-3">
        <div class="col-12">
          <p>{{pj.description}}</p>
        </div>
      </div>

      <!-- GALLERY -->
      <div class="row">
        <div class="col-12">
          <div class="card card-rounded shadow-lg p-3 bg-body">
            <div class="card-body p-0">
              <h6 class="fw-bold">Screenshots</h6>

              <!-- CAROUSEL -->
              <ngb-carousel>
                <ng-container *ngIf="pj.gallery1">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery1]" alt="Random 1 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery2">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery2]" alt="Random 2 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery3">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery3]" alt="Random 3 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery4">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery4]" alt="Random 4 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery5">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery5]" alt="Random 5 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery6">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery6]" alt="Random 6 slide" class="img-fluid">
                  </ng-template>
                </ng-container>

                <ng-container *ngIf="pj.gallery7">
                  <ng-template ngbSlide>
                    <img [src]="[pj.gallery7]" alt="Random 7 slide" class="img-fluid">
                  </ng-template>
                </ng-container>
              </ngb-carousel>

            </div>
          </div>
        </div>
      </div>

      <!-- BUTTONS SOURCE CODE -->
      <div class="row mt-2">
        <div class="col-12">
          <a class="btn btn-dark btn-sm mr-2" href="https://github.com/hprocastillo/kontrolateApp" target="_blank"
             type="button">
            <svg class="bi bi-github" fill="currentColor" height="16" viewBox="0 0 16 16" width="16"
                 xmlns="http://www.w3.org/2000/svg">
              <path
                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            Source Code
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
